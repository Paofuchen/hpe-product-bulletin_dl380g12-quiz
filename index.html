<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[UT專題]HPE Product Bulletin-DL380 Gen12查規格小遊戲</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --hpe-green:#01A982;--hpe-dark:#0D1117;--hpe-panel:#161C26;
    --hpe-card:#1E2635;--hpe-border:#2A3550;--hpe-text:#C8D6E8;
    --hpe-label:#7A90B0;--hpe-wrong:#E84A5F;--hpe-accent:#00D4FF;
    --radius:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--hpe-dark);color:var(--hpe-text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;
    background-image:radial-gradient(ellipse 60% 40% at 80% 10%,rgba(1,169,130,.08) 0%,transparent 60%),
    radial-gradient(ellipse 50% 30% at 10% 90%,rgba(0,212,255,.05) 0%,transparent 50%)}
  .site-header{background:rgba(13,17,23,.95);border-bottom:1px solid var(--hpe-border);padding:14px 28px;
    display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;backdrop-filter:blur(8px)}
  .logo-mark{width:34px;height:34px;background:var(--hpe-green);border-radius:6px;display:flex;align-items:center;
    justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;color:#000}
  .header-title{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;color:#fff}
  .header-title span{color:var(--hpe-green)}
  .header-badge{margin-left:auto;background:var(--hpe-panel);border:1px solid var(--hpe-border);border-radius:20px;
    padding:3px 12px;font-size:11px;color:var(--hpe-label);font-family:'Barlow Condensed',sans-serif;
    letter-spacing:1px;text-transform:uppercase}
  .container{max-width:820px;margin:0 auto;padding:36px 20px}
  #register-screen{text-align:center;padding:48px 0}
  .intro-chip{display:inline-block;background:rgba(1,169,130,.12);border:1px solid rgba(1,169,130,.3);
    color:var(--hpe-green);font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:4px 14px;
    border-radius:20px;margin-bottom:20px;font-family:'Barlow Condensed',sans-serif}
  .intro-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(28px,5vw,48px);font-weight:800;
    line-height:1.1;color:#fff;margin-bottom:12px}
  .intro-title em{color:var(--hpe-green);font-style:normal}
  .intro-sub{color:var(--hpe-label);font-size:14px;line-height:1.7;max-width:500px;margin:0 auto 28px}
  .pool-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(0,212,255,.08);
    border:1px solid rgba(0,212,255,.2);border-radius:20px;padding:6px 18px;font-size:13px;
    color:var(--hpe-accent);margin-bottom:28px}
  .pool-badge b{font-size:18px;font-weight:700}
  .stat-row{display:flex;justify-content:center;gap:24px;margin-bottom:32px;flex-wrap:wrap}
  .stat-c{text-align:center}
  .stat-n{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:800;color:var(--hpe-green);line-height:1}
  .stat-l{font-size:11px;color:var(--hpe-label);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
  .reg-card{background:var(--hpe-card);border:1px solid var(--hpe-border);border-radius:12px;padding:28px;
    max-width:440px;margin:0 auto 24px;text-align:left}
  .reg-card label{display:block;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--hpe-label);
    font-family:'Barlow Condensed',sans-serif;margin-bottom:7px}
  .reg-card input,.reg-card select{width:100%;background:var(--hpe-panel);border:1px solid var(--hpe-border);
    border-radius:var(--radius);padding:11px 13px;color:#fff;font-size:14px;
    font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color .2s;margin-bottom:16px}
  .reg-card input:focus,.reg-card select:focus{border-color:var(--hpe-green)}
  .reg-card select option{background:var(--hpe-panel)}
  .btn-start{width:100%;background:var(--hpe-green);color:#000;border:none;padding:13px;border-radius:var(--radius);
    font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:1px;
    cursor:pointer;transition:all .2s;text-transform:uppercase}
  .btn-start:hover{background:#02C99A}
  .btn-start:disabled{opacity:.45;cursor:not-allowed}
  #quiz-screen{display:none}
  .progress-wrap{background:var(--hpe-panel);border:1px solid var(--hpe-border);border-radius:var(--radius);
    padding:13px 18px;margin-bottom:22px;display:flex;align-items:center;gap:14px}
  .prog-meta{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--hpe-label);white-space:nowrap}
  .prog-meta span{color:var(--hpe-green);font-size:17px;font-weight:700}
  .prog-track{flex:1;height:5px;background:var(--hpe-border);border-radius:3px;overflow:hidden}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--hpe-green),var(--hpe-accent));border-radius:3px;transition:width .4s}
  .score-live{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--hpe-label);white-space:nowrap}
  .score-live span{color:var(--hpe-accent);font-size:17px;font-weight:700}
  /* seed badge */
  .seed-badge{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--hpe-label);
    background:var(--hpe-panel);border:1px solid var(--hpe-border);border-radius:20px;
    padding:2px 10px;white-space:nowrap;letter-spacing:.5px}
  .q-card{background:var(--hpe-card);border:1px solid var(--hpe-border);border-radius:12px;padding:28px;
    margin-bottom:16px;position:relative;overflow:hidden}
  .q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,var(--hpe-green),var(--hpe-accent))}
  .q-tag{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;
    color:var(--hpe-green);margin-bottom:11px;display:block}
  .q-text{font-size:16px;line-height:1.65;color:#fff;font-weight:500}
  .q-cat{display:inline-flex;align-items:center;gap:5px;margin-top:10px;background:rgba(0,212,255,.08);
    border:1px solid rgba(0,212,255,.2);border-radius:4px;padding:3px 10px;font-size:11px;
    color:var(--hpe-accent);letter-spacing:1px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif}
  .opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px}
  @media(max-width:560px){.opts-grid{grid-template-columns:1fr}}
  .opt-btn{background:var(--hpe-panel);border:1px solid var(--hpe-border);border-radius:var(--radius);
    padding:13px 15px;text-align:left;cursor:pointer;color:var(--hpe-text);font-size:13.5px;
    font-family:'Noto Sans TC',sans-serif;transition:all .18s;display:flex;align-items:flex-start;gap:10px;line-height:1.5}
  .opt-btn:hover:not(:disabled){border-color:var(--hpe-green);background:rgba(1,169,130,.08);color:#fff}
  .opt-key{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--hpe-green);
    background:rgba(1,169,130,.12);border-radius:4px;min-width:23px;height:23px;display:flex;
    align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .18s}
  .opt-btn.correct{background:rgba(1,169,130,.15);border-color:var(--hpe-green);color:#fff}
  .opt-btn.correct .opt-key{background:var(--hpe-green);color:#000}
  .opt-btn.wrong{background:rgba(232,74,95,.1);border-color:var(--hpe-wrong);color:var(--hpe-label)}
  .opt-btn.wrong .opt-key{background:var(--hpe-wrong);color:#fff}
  .opt-btn:disabled{cursor:default}
  .feedback-box{background:var(--hpe-panel);border-left:3px solid var(--hpe-green);
    border-radius:0 var(--radius) var(--radius) 0;padding:12px 15px;font-size:13px;line-height:1.6;
    color:var(--hpe-text);margin-bottom:16px;display:none}
  .feedback-box.wrong-fb{border-color:var(--hpe-wrong)}
  .feedback-box strong{color:var(--hpe-green)}
  .feedback-box.wrong-fb strong{color:var(--hpe-wrong)}
  .btn-next{background:transparent;border:1.5px solid var(--hpe-green);color:var(--hpe-green);
    padding:10px 32px;border-radius:var(--radius);font-family:'Barlow Condensed',sans-serif;
    font-size:15px;font-weight:700;letter-spacing:1px;cursor:pointer;text-transform:uppercase;
    transition:all .2s;display:none}
  .btn-next:hover{background:var(--hpe-green);color:#000}
  #result-screen{display:none;text-align:center;padding:40px 0}
  .result-ring-wrap{position:relative;width:170px;height:170px;margin:0 auto 26px}
  .result-ring-wrap svg{width:100%;height:100%;transform:rotate(-90deg)}
  .ring-bg{fill:none;stroke:var(--hpe-border);stroke-width:10}
  .ring-fill{fill:none;stroke:var(--hpe-green);stroke-width:10;stroke-linecap:round;
    stroke-dasharray:471;stroke-dashoffset:471;transition:stroke-dashoffset 1.2s ease}
  .result-ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .result-pct{font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:800;color:#fff;line-height:1}
  .result-label{font-size:11px;color:var(--hpe-label);letter-spacing:1px;text-transform:uppercase;margin-top:3px}
  .res-name-badge{display:inline-block;background:rgba(1,169,130,.12);border:1px solid rgba(1,169,130,.3);
    border-radius:20px;padding:4px 14px;font-size:13px;color:var(--hpe-green);margin:10px 0}
  .res-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;color:#fff;margin-bottom:6px}
  .res-msg{color:var(--hpe-label);font-size:14px;margin-bottom:26px;line-height:1.7;max-width:460px;margin-left:auto;margin-right:auto}
  .result-stats{display:flex;justify-content:center;gap:18px;margin-bottom:26px;flex-wrap:wrap}
  .r-stat{background:var(--hpe-card);border:1px solid var(--hpe-border);border-radius:var(--radius);padding:13px 22px;text-align:center}
  .r-stat-num{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:800}
  .r-stat-num.green{color:var(--hpe-green)}
  .r-stat-num.red{color:var(--hpe-wrong)}
  .r-stat-num.blue{color:var(--hpe-accent)}
  .r-stat-label{font-size:11px;color:var(--hpe-label);margin-top:3px;text-transform:uppercase;letter-spacing:1px}
  .submit-status{background:var(--hpe-card);border:1px solid var(--hpe-border);border-radius:var(--radius);
    padding:13px 18px;font-size:13px;margin-bottom:22px;color:var(--hpe-label);display:flex;align-items:center;gap:10px;
    max-width:400px;margin-left:auto;margin-right:auto}
  .submit-dot{width:8px;height:8px;border-radius:50%;background:var(--hpe-label);flex-shrink:0}
  .submit-dot.sending{background:var(--hpe-accent);animation:pulse 1s infinite}
  .submit-dot.done{background:var(--hpe-green)}
  .submit-dot.fail{background:var(--hpe-wrong)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .btn-retry{background:var(--hpe-green);color:#000;border:none;padding:11px 36px;border-radius:var(--radius);
    font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;
    cursor:pointer;text-transform:uppercase;transition:all .2s}
  .btn-retry:hover{background:#02C99A}
  .review-list{text-align:left;margin-top:34px}
  .review-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--hpe-label);
    letter-spacing:1px;text-transform:uppercase;margin-bottom:11px;padding-bottom:7px;border-bottom:1px solid var(--hpe-border)}
  .review-item{background:var(--hpe-card);border:1px solid var(--hpe-border);border-left:3px solid var(--hpe-wrong);
    border-radius:var(--radius);padding:11px 13px;margin-bottom:8px;font-size:13px;line-height:1.6}
  .rev-q{color:#fff;margin-bottom:4px;font-weight:500}
  .rev-a{color:var(--hpe-label)}
  .rev-a em{color:var(--hpe-green);font-style:normal}
  .rev-a s{color:var(--hpe-wrong)}
</style>
</head>
<body>

<header class="site-header">
  <div class="logo-mark">HPE</div>
  <div class="header-title">[UT專題] <span>DL380 Gen12</span> 查規格小遊戲</div>
  <div class="header-badge">題庫隨機抽題</div>
</header>

<div class="container">

  <!-- REGISTER -->
  <div id="register-screen">
    <div class="intro-chip">Professional Certification Quiz</div>
    <h1 class="intro-title">[UT專題] HPE Product Bulletin<br><em>DL380 Gen12</em><br>查規格小遊戲</h1>
    <p class="intro-sub">每次測驗從題庫隨機抽取 20 題，題目順序與選項順序皆會重新排列，確保每次作答體驗不同。</p>

    <div class="pool-badge">
      題庫共 <b id="pool-count">35</b> 題　每次隨機抽 <b>20</b> 題
    </div>

    <div class="stat-row">
      <div class="stat-c"><div class="stat-n">20</div><div class="stat-l">每次題數</div></div>
      <div class="stat-c"><div class="stat-n">8</div><div class="stat-l">主題分類</div></div>
      <div class="stat-c"><div class="stat-n">隨機</div><div class="stat-l">每次不同</div></div>
    </div>

    <div class="reg-card">
      <label>姓名 *</label>
      <input type="text" id="inp-name" placeholder="請輸入真實姓名" maxlength="20" oninput="checkForm()">
      <label>部門</label>
      <select id="inp-dept">
        <option value="">請選擇部門</option>
        <option value="行銷七部">行銷七部</option>
        <option value="商用業務一部">商用業務一部</option>
        <option value="商用業務五部">商用業務五部</option>
        <option value="商用業務六部">商用業務六部</option>
        <option value="商用業務七部">商用業務七部</option>
        <option value="商用業務九部">商用業務九部</option>
        <option value="專案協銷一部">專案協銷一部</option>
        <option value="專案協銷三部">專案協銷三部</option>
        <option value="新竹商用業務部">新竹商用業務部</option>
        <option value="台中商用業務部">台中商用業務部</option>
        <option value="台南商用業務部">台南商用業務部</option>
        <option value="高雄商用業務部">高雄商用業務部</option>
        <option value="技術支援一部">技術支援一部</option>
        <option value="技術支援三部">技術支援三部</option>
        <option value="經銷業務一部">經銷業務一部</option>
        <option value="經銷業務三部">經銷業務三部</option>
        <option value="新竹流通業務部">新竹流通業務部</option>
        <option value="南區流通業務部">南區流通業務部</option>
        <option value="流通業務一部">流通業務一部</option>
        <option value="流通業務三部">流通業務三部</option>
        <option value="流通業務七部">流通業務七部</option>
        <option value="其他">其他</option>
      </select>
      <label>員編 *</label>
      <input type="text" id="inp-empid" placeholder="請輸入員工編號" maxlength="20" oninput="checkForm()">
      <label>姓名 *</label>
      <input type="text" id="inp-name" placeholder="請輸入真實姓名" maxlength="20" oninput="checkForm()">
      <label>角色</label>
      <select id="inp-role">
        <option value="業務">業務</option>
        <option value="Presales">Presales</option>
        <option value="Product Sales">Product Sales</option>
        <option value="PM">PM</option>
        <option value="工程師">工程師</option>
      </select>
      <button class="btn-start" id="btn-start" onclick="startQuiz()" disabled>開始測驗（隨機 20 題）</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz-screen">
    <div class="progress-wrap">
      <div class="prog-meta">題目 <span id="q-current">1</span> / 20</div>
      <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="score-live">得分 <span id="score-live">0</span></div>
      <div class="seed-badge" id="seed-badge"></div>
    </div>
    <div class="q-card">
      <span class="q-tag" id="q-tag">QUESTION 01</span>
      <p class="q-text" id="q-text"></p>
      <div class="q-cat" id="q-cat"></div>
    </div>
    <div class="opts-grid" id="opts-grid"></div>
    <div class="feedback-box" id="feedback-box"></div>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">下一題 →</button>
  </div>

  <!-- RESULT -->
  <div id="result-screen">
    <div class="result-ring-wrap">
      <svg viewBox="0 0 170 170">
        <circle class="ring-bg" cx="85" cy="85" r="75"/>
        <circle class="ring-fill" id="result-ring" cx="85" cy="85" r="75"/>
      </svg>
      <div class="result-ring-text">
        <div class="result-pct" id="result-pct">0%</div>
        <div class="result-label">正確率</div>
      </div>
    </div>
    <div class="res-name-badge" id="res-name-badge"></div>
    <h2 class="res-title" id="res-title"></h2>
    <p class="res-msg" id="res-msg"></p>
    <div class="result-stats">
      <div class="r-stat"><div class="r-stat-num green" id="r-correct">0</div><div class="r-stat-label">答對</div></div>
      <div class="r-stat"><div class="r-stat-num red" id="r-wrong">0</div><div class="r-stat-label">答錯</div></div>
      <div class="r-stat"><div class="r-stat-num blue">20</div><div class="r-stat-label">總題數</div></div>
    </div>
    <div class="submit-status">
      <div class="submit-dot sending" id="submit-dot"></div>
      <span id="submit-msg">正在將成績上傳至後台…</span>
    </div>
    <button class="btn-retry" onclick="resetQuiz()">再次測驗（新題組）</button>
    <div class="review-list" id="review-list"></div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════
//  ★ 替換為你的 Google Apps Script Web App URL
// ═══════════════════════════════════════════════
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwXQuR1T9lTUo-cfJr-dmQjYn2TyC8O7NAhKr3cgaV8iNh3W83PLeYq0gtNr3aHqjIq/exec";
// ═══════════════════════════════════════════════

// ───────────────────────────────────────────────
//  題庫（35 題）— 可持續新增，格式不變
// ───────────────────────────────────────────────
const QUESTION_BANK = [
  // ── 平台規格 ──
  { cat:"平台規格", q:"HPE ProLiant Compute DL380 Gen12 的機架 Form Factor 為何？", opts:["1U Rack","2U Rack","4U Rack","Tower（可轉換）"], ans:1, explain:"DL380 Gen12 是標準 2U Rack 機架式伺服器，支援最多雙插槽 (2P) Intel Xeon 6 處理器。" },
  { cat:"平台規格", q:"DL380 Gen12 最多支援幾顆實體 CPU？", opts:["1 顆","2 顆","4 顆","8 顆"], ans:1, explain:"DL380 Gen12 為雙插槽（2P）設計，最多安裝 2 顆 Intel Xeon 6 處理器。" },
  { cat:"平台規格", q:"DL380 Gen12 前面板最多可配置幾個 PCIe Gen5 Hot-Plug NVMe SFF 硬碟槽？", opts:["8 個","12 個","16 個","24 個"], ans:3, explain:"SFF CTO 配置下，前面板最多支援 24 個 SFF（2.5\"）硬碟槽（含 NVMe/SAS/SATA）。" },

  // ── 處理器 ──
  { cat:"處理器", q:"DL380 Gen12 支援哪兩種 Intel Xeon 6 處理器核心架構？", opts:["Xeon 6 + Xeon 5 混搭","E-Core（效率核）與 P-Core（效能核）","AMD EPYC 9004 系列","Intel Xeon 4 第五代 Scalable"], ans:1, explain:"DL380 Gen12 同時支援 Intel Xeon 6 E-Core 與 P-Core，最高 144 Cores per 2-socket 系統。" },
  { cat:"處理器", q:"Intel Xeon 6 E-Core（6700E 系列）的最大核心數為何？", opts:["64 cores","96 cores","128 cores","144 cores"], ans:3, explain:"Xeon 6 E-Core 最高型號可達 144 cores，適合高密度平行計算工作負載。" },

// ── 隨機工具 ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// 每次 startQuiz 時從題庫隨機選 20 題，並把選項順序也隨機化
function drawQuestions() {
  const pool = shuffle(QUESTION_BANK).slice(0, 20);
  return pool.map(q => {
    // 把選項與正確答案索引一起打包後 shuffle
    const indexed = q.opts.map((o, i) => ({ text: o, correct: i === q.ans }));
    const shuffled = shuffle(indexed);
    return {
      cat: q.cat,
      q: q.q,
      opts: shuffled.map(x => x.text),
      ans: shuffled.findIndex(x => x.correct),
      explain: q.explain,
    };
  });
}

  studentDept  = document.getElementById('inp-dept').value || '未選擇';
  studentRole  = document.getElementById('inp-role').value;
  SESSION = drawQuestions();
  sessionSeed = 'SET-' + Date.now().toString(36).toUpperCase().slice(-5);
  currentQ = 0; score = 0; wrongItems = [];
  document.getElementById('register-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = SESSION[currentQ];
  document.getElementById('q-current').textContent = currentQ + 1;
  document.getElementById('prog-fill').style.width = ((currentQ / 20) * 100) + '%';
  document.getElementById('score-live').textContent = score;
  document.getElementById('q-tag').textContent = 'QUESTION ' + String(currentQ + 1).padStart(2, '0');
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('q-cat').textContent = '⬡ ' + q.cat;
  document.getElementById('seed-badge').textContent = sessionSeed;

  const grid = document.getElementById('opts-grid');
  grid.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.onclick = () => selectAnswer(i);
    btn.innerHTML = `<span class="opt-key">${KEYS[i]}</span><span>${opt}</span>`;
    grid.appendChild(btn);
  });

  const fb = document.getElementById('feedback-box');
  fb.style.display = 'none'; fb.className = 'feedback-box';
  document.getElementById('btn-next').style.display = 'none';
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = SESSION[currentQ];
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => b.disabled = true);
  btns[q.ans].classList.add('correct');

  const fb = document.getElementById('feedback-box');
  if (idx === q.ans) {
    score++;
    fb.className = 'feedback-box';
    fb.innerHTML = `<strong>✓ 答對！</strong> ${q.explain}`;
  } else {
    btns[idx].classList.add('wrong');
    fb.className = 'feedback-box wrong-fb';
    fb.innerHTML = `<strong>✗ 答錯。</strong>正確答案：<strong>${KEYS[q.ans]}. ${q.opts[q.ans]}</strong>。<br>${q.explain}`;
    wrongItems.push({ q: q.q, correct: q.opts[q.ans], picked: q.opts[idx] });
  }
  fb.style.display = 'block';
  document.getElementById('score-live').textContent = score;
  const btn = document.getElementById('btn-next');
  btn.textContent = currentQ < 19 ? '下一題 →' : '查看成績';
  btn.style.display = 'inline-block';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= 20) showResult();
  else renderQuestion();
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  const pct = Math.round((score / 20) * 100);
  document.getElementById('result-pct').textContent = pct + '%';
  document.getElementById('r-correct').textContent = score;
  document.getElementById('r-wrong').textContent = 20 - score;
  document.getElementById('res-name-badge').textContent =
    '👤 ' + studentName + (studentDept !== '未填寫' ? ' ／ ' + studentDept : '') + '　' + studentRole;

  const ring = document.getElementById('result-ring');
  setTimeout(() => { ring.style.strokeDashoffset = 471 - (pct / 100) * 471; }, 100);

  const msgs = [
    [90, '優秀！專業等級', `得分 ${score}/20（${pct}%）。已具備 DL380 Gen12 Pre-sales 工程師所需的深度技術知識，包含料號識別與規格比較能力。`],
    [70, '良好！繼續加強', `得分 ${score}/20（${pct}%）。掌握多數核心規格，建議針對錯題再次複習 QuickSpecs 料號對應與詳細限制。`],
    [50, '尚需努力',       `得分 ${score}/20（${pct}%）。建議重新研讀 HPE DL380 Gen12 QuickSpecs（a00073551enw），特別注意控制器料號章節。`],
    [0,  '需要加強複習',   `得分 ${score}/20（${pct}%）。請重新閱讀完整 QuickSpecs，著重各 SKU 料號與規格對應關係。`],
  ];
  const m = msgs.find(x => pct >= x[0]);
  if (pct < 50) ring.style.stroke = '#E84A5F';
  else if (pct < 70) ring.style.stroke = '#F0A500';
  document.getElementById('res-title').textContent = m[1];
  document.getElementById('res-msg').textContent = m[2];

  submitScore(score, pct);

  const revList = document.getElementById('review-list');
  if (wrongItems.length === 0) {
    revList.innerHTML = '<div class="review-title">錯題檢討</div><p style="color:var(--hpe-green);font-size:14px;margin-top:10px">🎉 全部答對！</p>';
  } else {
    revList.innerHTML = `<div class="review-title">錯題檢討（${wrongItems.length} 題）</div>`;
    wrongItems.forEach(w => {
      revList.innerHTML += `<div class="review-item"><div class="rev-q">${w.q}</div><div class="rev-a">您的答案：<s>${w.picked}</s>　正確答案：<em>${w.correct}</em></div></div>`;
    });
  }
}

function submitScore(score, pct) {
  const dot = document.getElementById('submit-dot');
  const msg = document.getElementById('submit-msg');
  const now = new Date();
  const ts = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const wrongStr = wrongItems.map(w => w.q.substring(0, 20) + '…').join(' | ') || '無';

  fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({
      name: studentName, empid: studentEmpId, dept: studentDept, role: studentRole,
      score, total: 20, pct, timestamp: ts,
      wrong: wrongStr, session: sessionSeed,
      pool_size: QUESTION_BANK.length
    })
  })
  .then(r => r.json())
  .then(() => {
    dot.className = 'submit-dot done';
    msg.textContent = '✓ 成績已成功上傳至後台';
    msg.style.color = 'var(--hpe-green)';
  })
  .catch(() => {
    dot.className = 'submit-dot fail';
    msg.textContent = '⚠ 網路異常，成績未能上傳（請通知主辦人）';
    msg.style.color = 'var(--hpe-wrong)';
  });
}

function resetQuiz() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('register-screen').style.display = 'block';
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-empid').value = '';
  document.getElementById('inp-dept').selectedIndex = 0;
  document.getElementById('inp-role').selectedIndex = 0;
  document.getElementById('btn-start').disabled = true;
  const ring = document.getElementById('result-ring');
  ring.style.strokeDashoffset = '471';
  ring.style.stroke = 'var(--hpe-green)';
}
</script>
</body>
</html>
